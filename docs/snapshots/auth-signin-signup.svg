  <text x="92" y="292" fill="#CFE0D7" font-family="Inter, Arial, sans-serif" font-size="18">Use Supabase Auth to protect the dashboard, limit log entry to authenticated users,</text>
  <text x="92" y="320" fill="#CFE0D7" font-family="Inter, Arial, sans-serif" font-size="18">and keep the API tied to real user sessions.</text>
